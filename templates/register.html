{% extends "base.html" %}
{% block title %}Register - Course Management System{% endblock %}

{% block content %}
<section class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md" data-aos="fade-up">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Register</h2>
    <form method="POST" action="{{ url_for('register') }}" class="space-y-6">
        <div>
            <label for="login_id" class="block text-gray-700 text-sm font-semibold mb-2">ID:</label> {# Changed label #}
            <input type="text" name="login_id" id="login_id" required {# IMPORTANT: Ensure name="login_id" #}
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Choose your College ID or User ID" /> {# Changed placeholder #}
        </div>

        <div>
            <label for="full_name" class="block text-gray-700 text-sm font-semibold mb-2">Full Name:</label>
            <input type="text" name="full_name" id="full_name" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Your full name" />
        </div>

        <div>
            <label for="email" class="block text-gray-700 text-sm font-semibold mb-2">Email:</label>
            <input type="email" name="email" id="email" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Your email address" />
        </div>

        <div>
            <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">Password:</label>
            <input type="password" name="password" id="password" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Choose a strong password" />
        </div>

        <div>
            <label for="role" class="block text-gray-700 text-sm font-semibold mb-2">Role:</label>
            <select name="role" id="role"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="student" selected>Student</option>
                <option value="instructor">Instructor</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Register
        </button>
    </form>
</section>
{% endblock %}
