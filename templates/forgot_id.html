{% extends "base.html" %}
{% block title %}Forgot Login ID - Course Management System{% endblock %}

{% block content %}
<section class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md" data-aos="fade-up">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Forgot Login ID</h2>
    <p class="text-gray-600 mb-6 text-center">Enter your email address and we'll send you your login ID.</p>
    
    <form method="POST" action="{{ url_for('forgot_id') }}" class="space-y-6">
        <div>
            <label for="email" class="block text-gray-700 text-sm font-semibold mb-2">Email Address:</label>
            <input type="email" id="email" name="email" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Enter your registered email" />
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Send My Login ID
        </button>
    </form>
    
    <div class="mt-6 text-center space-y-2">
        <p class="text-gray-600">
            <a href="{{ url_for('forgot_password') }}" class="text-blue-600 hover:underline">Forgot Password?</a>
        </p>
        <p class="text-gray-600">
            <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Back to Login</a>
        </p>
    </div>
</section>
{% endblock %}
