{% extends "base.html" %}
{% block title %}Login - Course Management System{% endblock %}

{% block content %}
<section class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md" data-aos="fade-up">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Login</h2>
    <form method="POST" action="{{ url_for('login') }}" class="space-y-6">
        <div>
            <label for="login_id" class="block text-gray-700 text-sm font-semibold mb-2">ID:</label> {# Changed label #}
            <input type="text" id="login_id" name="login_id" required {# IMPORTANT: Ensure name="login_id" #}
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Your College ID or User ID" /> {# Changed placeholder #}
        </div>

        <div>
            <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">Password:</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Your password" />
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
            Login
        </button>
    </form>
    <p class="mt-6 text-center text-gray-600">Don't have an account? <a href="{{ url_for('register') }}" class="text-blue-600 hover:underline">Register here</a>.</p>
</section>
{% endblock %}
