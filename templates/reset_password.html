{% extends "base.html" %}
{% block title %}Reset Password - Course Management System{% endblock %}

{% block content %}
<section class="max-w-md mx-auto mt-10 bg-white p-8 rounded-lg shadow-md" data-aos="fade-up">
    <h2 class="text-3xl font-bold text-gray-800 mb-6 text-center">Reset Password</h2>
    <p class="text-gray-600 mb-6 text-center">Enter your new password below.</p>
    
    <form method="POST" action="{{ url_for('reset_password', token=token) }}" class="space-y-6">
        <div>
            <label for="password" class="block text-gray-700 text-sm font-semibold mb-2">New Password:</label>
            <input type="password" id="password" name="password" required minlength="6"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Enter new password (min 6 characters)" />
        </div>

        <div>
            <label for="confirm_password" class="block text-gray-700 text-sm font-semibold mb-2">Confirm New Password:</label>
            <input type="password" id="confirm_password" name="confirm_password" required minlength="6"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                   placeholder="Confirm new password" />
        </div>

        <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 px-4 rounded-md transition duration-300 ease-in-out transform hover:scale-105 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2">
            Reset Password
        </button>
    </form>
    
    <p class="mt-6 text-center text-gray-600">
        <a href="{{ url_for('login') }}" class="text-blue-600 hover:underline">Back to Login</a>
    </p>
</section>
{% endblock %}
