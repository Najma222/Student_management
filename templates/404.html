{% extends "base.html" %}

{% block title %}Page Not Found - 404{% endblock %}

{% block content %}
<section class="text-center py-16 bg-white rounded-lg shadow-md max-w-2xl mx-auto mt-10" data-aos="fade-up">
    <h1 class="text-5xl font-bold text-red-600 mb-4">404 - Page Not Found</h1>
    <p class="text-xl text-gray-700 mb-6">Sorry, the page you're looking for doesn't exist.</p>
    <a href="{{ url_for('home') }}" class="bg-blue-500 hover:bg-blue-600 text-white font-semibold py-2 px-6 rounded-lg transition duration-300">
        Go back to Home
    </a>
</section>
{% endblock %}
